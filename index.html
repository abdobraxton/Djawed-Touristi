<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحويل الدينار التونسي</title>

<style>
:root{
    --primary:#e63946;
    --success:#16a34a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#e63946,#c1121f);
}

.converter{
    width:100%;
    max-width:500px;
    background:#fff;
    border-radius:24px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    font-size:52px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#1f2937;
    margin-bottom:15px;
}

.rate-box{
    background:#f8fafc;
    border-radius:12px;
    padding:15px;
    text-align:center;
    margin-bottom:20px;
    line-height:1.8;
    color:#475569;
    font-weight:600;
}

label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    font-size:18px;
}

.result{
    display:none;
    margin-top:20px;
}

.card{
    background:#f8fafc;
    border-radius:15px;
    padding:18px;
    text-align:center;
    margin-bottom:15px;
}

.value{
    font-size:32px;
    color:var(--success);
    font-weight:bold;
}

.currency{
    margin-top:5px;
    color:#64748b;
}

.footer{
    margin-top:15px;
    text-align:center;
    color:#94a3b8;
    font-size:13px;
}

@media(max-width:500px){
    .value{
        font-size:26px;
    }

    .converter{
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="converter">

    <div class="logo">🇹🇳💶🇩🇿</div>

    <h1>محول الدينار التونسي</h1>

    <div class="rate-box">
        100 € = 336 د.ت 🇹🇳<br>
        100 € = 27500 د.ج 🇩🇿
    </div>

    <label>أدخل المبلغ بالدينار التونسي</label>

    <input
        type="number"
        id="tnd"
        placeholder="مثال: 336">

    <div class="result" id="resultBox">

        <div class="card">
            <div class="value" id="eurResult">0 €</div>
            <div class="currency">اليورو 💶</div>
        </div>

        <div class="card">
            <div class="value" id="dzdResult">0 د.ج</div>
            <div class="currency">الدينار الجزائري 🇩🇿</div>
        </div>

    </div>

    <div class="footer">
        التحويل يتم تلقائياً أثناء الكتابة
    </div>

</div>

<script>

const TND_TO_EUR = 100 / 336;
const EUR_TO_DZD = 275;

function convertCurrency(){

    const tnd = parseFloat(
        document.getElementById("tnd").value
    );

    if(isNaN(tnd) || tnd <= 0){
        document.getElementById("resultBox").style.display="none";
        return;
    }

    const eur = tnd * TND_TO_EUR;
    const dzd = eur * EUR_TO_DZD;

    document.getElementById("eurResult").innerHTML =
        eur.toFixed(2) + " €";

    document.getElementById("dzdResult").innerHTML =
        dzd.toLocaleString('fr-FR') + " د.ج";

    document.getElementById("resultBox").style.display="block";
}

document
.getElementById("tnd")
.addEventListener("input", convertCurrency);

</script>

</body>
</html>
