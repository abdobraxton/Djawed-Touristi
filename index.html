<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محول اليورو والدينار التونسي</title>

<style>
:root{
    --primary:#e63946;
    --secondary:#ffffff;
    --dark:#1f2937;
    --bg:#f8fafc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#e63946,#c1121f);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.converter{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,.98);
    border-radius:25px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    font-size:50px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:var(--dark);
    margin-bottom:10px;
    font-size:28px;
}

.rate-box{
    background:#f1f5f9;
    border-radius:12px;
    padding:12px;
    text-align:center;
    margin-bottom:20px;
    color:#475569;
    font-weight:600;
}

label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    font-size:18px;
    margin-bottom:15px;
}

select{
    width:100%;
    padding:14px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    font-size:16px;
    margin-bottom:15px;
    background:white;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.result{
    margin-top:20px;
    text-align:center;
    background:#f8fafc;
    border-radius:15px;
    padding:20px;
    display:none;
}

.result-value{
    font-size:32px;
    font-weight:bold;
    color:#16a34a;
}

.result-text{
    margin-top:8px;
    color:#64748b;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:13px;
    color:#94a3b8;
}

@media(max-width:500px){
    .converter{
        padding:20px;
    }

    h1{
        font-size:22px;
    }

    .result-value{
        font-size:26px;
    }
}
</style>
</head>

<body>

<div class="converter">

    <div class="logo">💶🇹🇳</div>

    <h1>محول اليورو والدينار التونسي</h1>

    <div class="rate-box">
        100 يورو = 336 دينار تونسي
    </div>

    <label>المبلغ</label>
    <input type="number" id="amount" placeholder="أدخل المبلغ">

    <select id="type">
        <option value="eur">يورو → دينار تونسي</option>
        <option value="tnd">دينار تونسي → يورو</option>
    </select>

    <button onclick="convertCurrency()">
        تحويل الآن
    </button>

    <div class="result" id="resultBox">
        <div class="result-value" id="result"></div>
        <div class="result-text" id="text"></div>
    </div>

    <div class="footer">
        سعر الصرف المعتمد: 1 EUR = 3.36 TND
    </div>

</div>

<script>

const EUR_TO_TND = 3.36;
const TND_TO_EUR = 1 / EUR_TO_TND;

function convertCurrency(){

    let amount =
    parseFloat(document.getElementById("amount").value);

    if(isNaN(amount) || amount <= 0){
        alert("الرجاء إدخال مبلغ صحيح");
        return;
    }

    let type =
    document.getElementById("type").value;

    let result;

    if(type === "eur"){
        result = amount * EUR_TO_TND;

        document.getElementById("result").innerHTML =
        result.toFixed(2) + " د.ت";

        document.getElementById("text").innerHTML =
        amount + " يورو";
    }

    else{

        result = amount * TND_TO_EUR;

        document.getElementById("result").innerHTML =
        result.toFixed(2) + " €";

        document.getElementById("text").innerHTML =
        amount + " دينار تونسي";
    }

    document.getElementById("resultBox").style.display =
    "block";
}

</script>

</body>
</html>
